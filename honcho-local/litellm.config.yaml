model_list:
  - model_name: honcho-chat-lab
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.3-instant

  - model_name: honcho-chat-fallback-deepseek
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      api_base: https://api.deepseek.com/v1

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true

router_settings:
  routing_strategy: simple-shuffle

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: null
