    - -js
    - -sd
    - /data
    - -m
    - '8222'
    - -n
    - nats
    restart: unless-stopped
    networks:
    - internal
    volumes:
    - nats_data:/data
    expose:
    - '4222'
    - '8222'
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q --spider http://127.0.0.1:8222/healthz?js-enabled=true || exit 1
