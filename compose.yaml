name: the-ai-crowd

x-hermes-env: &hermes-env
    TZ: ${TZ:-UTC}
    HERMES_UID: 99
    HERMES_GID: 100
    HOME: /opt/data
    HERMES_KANBAN_HOME: /mnt/hermes-shared/kanban
    HERMES_KANBAN_DISPATCH_OWNER: ${HERMES_KANBAN_DISPATCH_OWNER:-}
    HERMES_KANBAN_DISPATCH_UNOWNED_BOARDS: ${HERMES_KANBAN_DISPATCH_UNOWNED_BOARDS:-true}
x-hermes-llm-env-files: &hermes-llm-env-files
  - ./state/secrets/hermes-llm/fleet.env
x-hermes-common: &hermes-common
  restart: always
  user: "99:100"
  environment:
    <<: *hermes-env
  networks:
    - internal

services:
  moss:
    <<: *hermes-common
    # All-in-one runtime: supervisord starts gateway, dashboard, and WebUI.
    # Runs supervisor as root only to drop child programs to hermes UID/GID 99:100.
    user: "0:0"
    env_file: *hermes-llm-env-files
    build:
      context: .
      dockerfile: ops/images/Dockerfile.moss-all-in-one
    image: the-ai-crowd/moss-all-in-one:local
    working_dir: /agents/moss/private
    environment:
      <<: *hermes-env
      AGENT_NAME: moss
      AGENT_ROOT: /agents/moss
      AGENT_PUBLIC: /agents/moss/public
      AGENT_PRIVATE: /agents/moss/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
      TERMINAL_CWD: /agents/moss/private
      HERMES_KANBAN_HOME: /mnt/hermes-shared/kanban/moss
      HERMES_KANBAN_DISPATCH_OWNER: moss
      HERMES_KANBAN_DISPATCH_UNOWNED_BOARDS: "false"
      WEBHOOK_ENABLED: "true"
      WEBHOOK_PORT: "8644"
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_TUI: "1"
      HERMES_WEBUI_AGENT_DIR: /opt/hermes
      HERMES_WEBUI_HOST: 0.0.0.0
      HERMES_WEBUI_PORT: "8787"
      HERMES_WEBUI_STATE_DIR: /opt/data/webui
      HERMES_WEBUI_DEFAULT_WORKSPACE: /agents/moss/private
    volumes:
      - ./runtime/moss-home:/opt/data
      - ./agents/public/moss:/agents/moss/public:ro
      - ./agents/private/moss:/agents/moss/private:rw
      - ./state/shared:/mnt/hermes-shared
    networks:
      internal:
      private_proxy:
        aliases:
          - hermes
      local_llm:
    expose:
      - "8787"
      - "9119"
      - "8644"
    ports:
      - "0.0.0.0:8644:8644"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8787/health >/dev/null && curl -fsS http://127.0.0.1:9119/api/status >/dev/null && curl -fsS http://127.0.0.1:8644/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 90s


  jen:
    <<: *hermes-common
    # Hermes Agent v0.15.2 image starts via s6 as root, then drops privileges internally.
    user: "0:0"
    env_file: *hermes-llm-env-files
    build:
      context: .
      dockerfile: ops/images/Dockerfile.jen
    image: the-ai-crowd/jen:local
    working_dir: /agents/jen/private
    environment:
      <<: *hermes-env
      AGENT_NAME: jen
      AGENT_ROOT: /agents/jen
      AGENT_PUBLIC: /agents/jen/public
      AGENT_PRIVATE: /agents/jen/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
      TERMINAL_CWD: /agents/jen/private
      HERMES_KANBAN_HOME: /mnt/hermes-shared/kanban/jen
      GOG_HOME: /opt/data/gog
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: ${JEN_GOG_KEYRING_PASSWORD:-}
      GOG_ACCOUNT: ${JEN_GOOGLE_ACCOUNT:-}
    volumes:
      - ./runtime/jen-home:/opt/data
      - ./agents/public/jen:/agents/jen/public:ro
      - ./agents/private/jen:/agents/jen/private:rw
      - ./state/shared:/mnt/hermes-shared
    expose:
      - "9121"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9121/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  denholm:
    <<: *hermes-common
    # Hermes Agent v0.15.2 image starts via s6 as root, then drops privileges internally.
    user: "0:0"
    env_file: *hermes-llm-env-files
    build:
      context: .
      dockerfile: ops/images/Dockerfile.denholm
    image: the-ai-crowd/denholm:local
    working_dir: /agents/denholm/private
    environment:
      <<: *hermes-env
      AGENT_NAME: denholm
      AGENT_ROOT: /agents/denholm
      AGENT_PUBLIC: /agents/denholm/public
      AGENT_PRIVATE: /agents/denholm/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
      TERMINAL_CWD: /agents/denholm/private
      HERMES_KANBAN_HOME: /mnt/hermes-shared/kanban/denholm
    volumes:
      - ./runtime/denholm-home:/opt/data
      - ./agents/public/denholm:/agents/denholm/public:ro
      - ./agents/private/denholm:/agents/denholm/private:rw
      - ./state/shared:/mnt/hermes-shared
    expose:
      - "9122"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9122/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  roy:
    <<: *hermes-common
    # Hermes Agent v0.15.2 image starts via s6 as root, then drops privileges internally.
    user: "0:0"
    env_file: *hermes-llm-env-files
    build:
      context: .
      dockerfile: ops/images/Dockerfile.roy
    image: the-ai-crowd/roy:local
    working_dir: /agents/roy/private
    command: ["gateway", "run"]
    environment:
      <<: *hermes-env
      HERMES_HOME: /opt/data
      HERMES_KANBAN_DISPATCH_OWNER: roy
      HERMES_KANBAN_DISPATCH_UNOWNED_BOARDS: "false"
      AGENT_NAME: roy
      AGENT_ROOT: /agents/roy
      AGENT_PUBLIC: /agents/roy/public
      AGENT_PRIVATE: /agents/roy/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
      TERMINAL_CWD: /agents/roy/private
      HERMES_KANBAN_HOME: /mnt/hermes-shared/kanban/roy
      WEBHOOK_ENABLED: "true"
      WEBHOOK_PORT: "8644"
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9123"
      HERMES_DASHBOARD_TUI: "1"
      HERMES_DASHBOARD_INSECURE: "1"
    volumes:
      - ./runtime/roy-home:/opt/data
      - ./agents/public/roy:/agents/roy/public:ro
      - ./agents/private/roy:/agents/roy/private:rw
      - ./state/shared:/mnt/hermes-shared
    expose:
      - "9123"
      - "8644"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9123/ >/dev/null && curl -fsS http://127.0.0.1:8644/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  richmond:
    <<: *hermes-common
    profiles: ["richmond"]
    env_file: *hermes-llm-env-files
    build:
      context: .
      dockerfile: ops/images/Dockerfile.richmond
    image: the-ai-crowd/richmond:local
    environment:
      <<: *hermes-env
      AGENT_NAME: richmond
      AGENT_ROOT: /agents/richmond
      AGENT_PUBLIC: /agents/richmond/public
      AGENT_PRIVATE: /agents/richmond/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
      TERMINAL_CWD: /agents/richmond/private
      HERMES_KANBAN_HOME: /mnt/hermes-shared/kanban/richmond
      HERMES_KANBAN_DISPATCH_OWNER: richmond
      HERMES_KANBAN_DISPATCH_UNOWNED_BOARDS: "false"
    volumes:
      - ./runtime/richmond-home:/opt/data
      - ./agents/public/richmond:/agents/richmond/public:ro
      - ./agents/private/richmond:/agents/richmond/private:rw
      - ./state/shared:/mnt/hermes-shared
    expose:
      - "9120"

  the-elders:
    <<: *hermes-common
    profiles: ["the-elders"]
    build:
      context: .
      dockerfile: ops/images/Dockerfile.the-elders
    image: the-ai-crowd/the-elders:local
    environment:
      <<: *hermes-env
      AGENT_NAME: the-elders
      AGENT_ROOT: /agents/the-elders
      AGENT_PUBLIC: /agents/the-elders/public
      AGENT_PRIVATE: /agents/the-elders/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./runtime/the-elders-home:/opt/data
      - ./agents/public/the-elders:/agents/the-elders/public:ro
      - ./agents/private/the-elders:/agents/the-elders/private:rw
      - ./state/shared:/mnt/hermes-shared:ro
    expose:
      - "9130"

networks:
  internal:
    name: the-ai-crowd_internal
  private_proxy:
    external: true
    name: ${THE_AI_CROWD_PROXY_NETWORK:-network_default}
  local_llm:
    external: true
    name: local-llm-net
