name: the-ai-crowd

x-hermes-env: &hermes-env
    TZ: ${TZ:-UTC}
    HERMES_DASHBOARD_TUI: ${HERMES_DASHBOARD_TUI:-1}
    HERMES_UID: ${HERMES_UID:-1000}
    HERMES_GID: ${HERMES_GID:-1000}
    HOME: /opt/data
    HERMES_KANBAN_HOME: /mnt/hermes-shared/kanban
x-hermes-llm-env-files: &hermes-llm-env-files
  - ./state/secrets/hermes-llm/fleet.env
x-hermes-common: &hermes-common
  restart: unless-stopped
  environment:
    <<: *hermes-env
  networks:
    - internal

services:
  moss:
    <<: *hermes-common
    env_file: *hermes-llm-env-files
    build:
      context: .
      dockerfile: ops/images/Dockerfile.moss
    image: the-ai-crowd/moss:local
    working_dir: /agents/moss/private
    environment:
      <<: *hermes-env
      AGENT_NAME: moss
      AGENT_ROOT: /agents/moss
      AGENT_PUBLIC: /agents/moss/public
      AGENT_PRIVATE: /agents/moss/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
      TERMINAL_CWD: /agents/moss/private
      WEBHOOK_ENABLED: "true"
      WEBHOOK_PORT: "8644"
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
    command:
      - gateway
      - run
    volumes:
      - ./runtime/moss-home:/opt/data
      - ./agents/public/moss:/agents/moss/public:ro
      - ./agents/private/moss:/agents/moss/private:rw
      - ./state/shared:/mnt/hermes-shared
    networks:
      internal:
      private_proxy:
        aliases:
          - hermes
    expose:
      - "9119"
      - "8644"
    ports:
      - "0.0.0.0:8644:8644"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9119/ >/dev/null && curl -fsS http://127.0.0.1:8644/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s


  jen:
    <<: *hermes-common
    env_file: *hermes-llm-env-files
    profiles: ["jen-bootstrap"]
    build:
      context: .
      dockerfile: ops/images/Dockerfile.jen
    image: the-ai-crowd/jen:local
    working_dir: /agents/jen/private
    environment:
      <<: *hermes-env
      AGENT_NAME: jen
      AGENT_ROOT: /agents/jen
      AGENT_PUBLIC: /agents/jen/public
      AGENT_PRIVATE: /agents/jen/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
      TERMINAL_CWD: /agents/jen/private
      GOG_HOME: /opt/data/gog
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: ${JEN_GOG_KEYRING_PASSWORD:-}
      GOG_ACCOUNT: ${JEN_GOOGLE_ACCOUNT:-}
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9121"
    command:
      - gateway
      - run
    volumes:
      - ./runtime/jen-home:/opt/data
      - ./agents/public/jen:/agents/jen/public:ro
      - ./agents/private/jen:/agents/jen/private:rw
      - ./state/shared:/mnt/hermes-shared
    expose:
      - "9121"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9121/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  denholm:
    <<: *hermes-common
    env_file: *hermes-llm-env-files
    profiles: ["denholm-bootstrap"]
    build:
      context: .
      dockerfile: ops/images/Dockerfile.denholm
    image: the-ai-crowd/denholm:local
    working_dir: /agents/denholm/private
    environment:
      <<: *hermes-env
      AGENT_NAME: denholm
      AGENT_ROOT: /agents/denholm
      AGENT_PUBLIC: /agents/denholm/public
      AGENT_PRIVATE: /agents/denholm/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
      TERMINAL_CWD: /agents/denholm/private
    command:
      - hermes
      - dashboard
      - --host
      - 0.0.0.0
      - --port
      - "9122"
      - --insecure
      - --no-open
      - --tui
      - --skip-build
    volumes:
      - ./runtime/denholm-home:/opt/data
      - ./agents/public/denholm:/agents/denholm/public:ro
      - ./agents/private/denholm:/agents/denholm/private:rw
      - ./state/shared:/mnt/hermes-shared
    expose:
      - "9122"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9122/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  richmond:
    <<: *hermes-common
    profiles: ["richmond"]
    build:
      context: .
      dockerfile: ops/images/Dockerfile.richmond
    image: the-ai-crowd/richmond:local
    environment:
      <<: *hermes-env
      AGENT_NAME: richmond
      AGENT_ROOT: /agents/richmond
      AGENT_PUBLIC: /agents/richmond/public
      AGENT_PRIVATE: /agents/richmond/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
    command: ["hermes", "dashboard", "--host", "0.0.0.0", "--port", "9120", "--insecure", "--no-open", "--tui", "--skip-build"]
    volumes:
      - ./runtime/richmond-home:/opt/data
      - ./agents/public/richmond:/agents/richmond/public:ro
      - ./agents/private/richmond:/agents/richmond/private:rw
      - ./state/shared:/mnt/hermes-shared
    expose:
      - "9120"

  the-elders:
    <<: *hermes-common
    profiles: ["the-elders"]
    build:
      context: .
      dockerfile: ops/images/Dockerfile.the-elders
    image: the-ai-crowd/the-elders:local
    environment:
      <<: *hermes-env
      AGENT_NAME: the-elders
      AGENT_ROOT: /agents/the-elders
      AGENT_PUBLIC: /agents/the-elders/public
      AGENT_PRIVATE: /agents/the-elders/private
      AGENT_RUNTIME: /opt/data
      AGENT_SHARED: /mnt/hermes-shared
    command: ["hermes", "dashboard", "--host", "0.0.0.0", "--port", "9130", "--insecure", "--no-open", "--skip-build"]
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./runtime/the-elders-home:/opt/data
      - ./agents/public/the-elders:/agents/the-elders/public:ro
      - ./agents/private/the-elders:/agents/the-elders/private:rw
      - ./state/shared:/mnt/hermes-shared:ro
    expose:
      - "9130"

networks:
  internal:
    name: the-ai-crowd_internal
  private_proxy:
    external: true
    name: ${THE_AI_CROWD_PROXY_NETWORK:-network_default}
