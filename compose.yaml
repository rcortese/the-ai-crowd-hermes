  denholm:
    restart: always
    user: 0:0
    environment:
      TZ: ${TZ:-UTC}
      HERMES_UID: 99
      HERMES_GID: 100
      HOME: /opt/data
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      HERMES_KANBAN_HOME: /mnt/hermes-shared
