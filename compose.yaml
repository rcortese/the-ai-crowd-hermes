      HERMES_KANBAN_DISPATCH_UNOWNED_BOARDS: ${HERMES_KANBAN_DISPATCH_UNOWNED_BOARDS:-true}
      AGENT_NAME: jen
      AGENT_ROOT: /agents/jen
      AGENT_PUBLIC: /agents/jen/public
      AGENT_PRIVATE: /agents/jen/private
      AGENT_RUNTIME: /opt/data
