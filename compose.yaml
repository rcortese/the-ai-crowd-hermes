      TELEGRAM_ALLOW_ALL_USERS: ${JEN_TELEGRAM_ALLOW_ALL_USERS:-}
      TODOIST_API_TOKEN: ${JEN_TODOIST_API_TOKEN:-}
      JEN_GOOGLE_ACCOUNT: ${JEN_GOOGLE_ACCOUNT:-}
      JEN_GOG_KEYRING_PASSWORD: ${JEN_GOG_KEYRING_PASSWORD:-}
      GOG_ACCOUNT: ${JEN_GOG_ACCOUNT:-}
      GOG_KEYRING_PASSWORD: ${JEN_GOG_KEYRING_PASSWORD:-}
      ANTHROPIC_API_KEY: ${JEN_ANTHROPIC_API_KEY:-}
      ANTHROPIC_TOKEN: ${JEN_ANTHROPIC_TOKEN:-}
