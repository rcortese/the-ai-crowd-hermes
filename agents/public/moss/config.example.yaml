model:
  # Provider credentials are intentionally configured outside git.
  default: anthropic/claude-opus-4.6
  provider: auto

display:
  personality: friendly
  reasoning: off

agent:
  name: moss
  public_root: /agents/moss/public
  private_root: /agents/moss/private
  runtime_root: /opt/data
  shared_root: /mnt/hermes-shared

terminal:
  backend: local
  timeout: 180
  working_dir: /agents/moss/public

context:
  compression:
    enabled: true
    threshold: 0.50
    target_ratio: 0.20
    protect_last: 20

timezone: UTC
