agent: moss
source_openclaw_agent: moss
runtime: hermes-agent-ops
model_source: configured-outside-git
image: the-ai-crowd/moss:local
status: production-mvp-enabled
installed_tools:
  - git
  - gh
  - jq
  - ripgrep
  - sqlite3
  - python3
  - python3-venv
  - curl
  - dnsutils
  - iputils-ping
  - netcat-openbsd
  - openssh-client
  - rsync
openclaw_equivalent_capabilities:
  - filesystem
  - runtime/exec
  - web/research via Hermes toolsets when configured
  - git/github operations
not_migrated_yet:
  - OpenClaw gateway/config tools
  - lossless-claw recall
  - OpenClaw cron jobs
  - external messaging channel bindings
  - private-host SSH key mount
  - Docker socket mount
security_note: >-
  Dashboard access belongs in private deployment-specific reverse-proxy configuration. Host-control mounts remain disabled until reviewed.
