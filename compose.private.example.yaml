# Legacy private deployment override example.
# The canonical deployment path uses only compose.yaml.
# Keep this as a custom-extension or rollback example only; do not use it for
# normal deployments that can set THE_AI_CROWD_PROXY_NETWORK in ignored .env.
# The private proxy should use the stable network alias `hermes:9119`,
# not the Compose service/container name.

x-private-env: &private-env
  env_file:
    - .env

services:
  moss:
    <<: *private-env
    networks:
      internal:
      private_proxy:
        aliases:
          - hermes

networks:
  private_proxy:
    external: true
    name: <private-proxy-network-name>
